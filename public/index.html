<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempo — Rithum AI Prospecting</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c10;--bg2:#111318;--bg3:#181b22;--bg4:#1e222b;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#e8eaf0;--text2:#8b90a0;--text3:#555a6a;--accent:#7537d6;--accent2:#5a1fb8;--teal:#2dd4aa;--amber:#f5a623;--pink:#e05fd0;--green:#4caf82;--red:#e05f5f;--r:10px;--rs:6px;--f:'DM Sans',sans-serif;--mono:'DM Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--f);font-size:14px;overflow:hidden}

/* LOGIN */
.login-wrap{height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:40px;width:380px}
.login-logo{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
.login-title{font-size:26px;font-weight:600;color:var(--text);margin-bottom:6px}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:28px}
.login-err{font-size:12px;color:var(--red);margin-bottom:12px;display:none}
.inp{width:100%;padding:10px 14px;font-size:13px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);font-family:var(--f);margin-bottom:10px;transition:border-color .15s}
.inp:focus{outline:none;border-color:var(--accent)}
.inp::placeholder{color:var(--text3)}
.lbtn{width:100%;padding:12px;font-size:13px;font-weight:600;background:#7537d6;color:#fff;border:none;border-radius:var(--rs);cursor:pointer;font-family:var(--f);transition:background .15s}
.lbtn:hover{background:#5a1fb8}

/* APP SHELL */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:230px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* SIDEBAR */
.sb-top{padding:18px 18px 14px;border-bottom:1px solid var(--border)}
.sb-brand{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent)}
.sb-user{font-size:12px;color:var(--text2);margin-top:4px;display:flex;align-items:center;gap:6px}
.sb-role{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600}
.role-mgr{background:rgba(117,55,214,.15);color:#b388f7;border:1px solid rgba(117,55,214,.25)}
.role-rep{background:rgba(117,55,214,.12);color:#b388f7;border:1px solid rgba(117,55,214,.2)}
.sb-sect{padding:14px 18px 5px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em}
.sb-nav{padding:7px 18px;font-size:12px;cursor:pointer;color:var(--text2);border-left:2px solid transparent;transition:all .15s;display:flex;align-items:center;gap:8px}
.sb-nav:hover{color:var(--text);background:var(--bg3)}
.sb-nav.active{color:var(--text);border-left-color:var(--accent);background:var(--bg3)}
.sb-nav-icon{font-size:13px;width:16px;text-align:center}
.sb-scroll{overflow-y:auto;flex:1}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}
.sb-acct{padding:6px 18px 6px 28px;font-size:12px;cursor:pointer;color:var(--text2);border-left:2px solid transparent;transition:all .15s;display:flex;flex-direction:column;gap:1px}
.sb-acct:hover{color:var(--text);background:var(--bg3)}
.sb-acct.active{color:var(--text);border-left-color:var(--accent);background:var(--bg3)}
.sb-acct .an{font-weight:500;font-size:12px}
.sb-acct .at{font-size:10px}
.sb-bottom{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px}

/* STATUS TYPES */
.t-open{color:#7537d6}.t-eu{color:var(--amber)}.t-cold{color:var(--text3)}.t-won{color:var(--teal)}.t-nurture{color:var(--pink)}

/* TOPBAR */
.topbar{padding:13px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--bg2);flex-shrink:0}
.topbar-name{font-size:15px;font-weight:600;flex:1}
.pill{display:inline-block;font-size:10px;padding:3px 10px;border-radius:20px;font-weight:500}
.p-blue{background:rgba(117,55,214,.15);color:#b388f7;border:1px solid rgba(117,55,214,.2)}
.p-teal{background:rgba(45,212,170,.12);color:var(--teal);border:1px solid rgba(45,212,170,.2)}
.p-amber{background:rgba(245,166,35,.12);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
.p-pink{background:rgba(224,95,208,.12);color:var(--pink);border:1px solid rgba(224,95,208,.2)}
.p-gray{background:rgba(255,255,255,.06);color:var(--text2);border:1px solid var(--border)}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);overflow-x:auto;flex-shrink:0}
.tabs::-webkit-scrollbar{height:0}
.tab{padding:10px 15px;font-size:12px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;position:relative}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.tab .nd{position:absolute;top:8px;right:5px;width:5px;height:5px;border-radius:50%;background:var(--teal)}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:20px}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}

/* CARDS & FORMS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.card-h{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.hint{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:14px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.field input,.field textarea,.field select{padding:8px 12px;font-size:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:var(--f);width:100%;transition:border-color .15s}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent);background:var(--bg4)}
.field select option{background:var(--bg3)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.btn{padding:8px 16px;font-size:12px;font-weight:500;border:1px solid var(--border2);border-radius:var(--rs);cursor:pointer;background:transparent;color:var(--text2);transition:all .15s;font-family:var(--f)}
.btn:hover{background:var(--bg4);color:var(--text)}
.btn-p{background:#7537d6;color:#fff;border-color:#7537d6}
.btn-p:hover{background:#5a1fb8;border-color:#5a1fb8;color:#fff}
.btn-danger{border-color:rgba(224,95,95,.3);color:var(--red)}
.btn-danger:hover{background:rgba(224,95,95,.1)}
.btn-sm{padding:5px 11px;font-size:11px}
.brow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.out{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:14px;font-size:12px;line-height:1.75;color:var(--text);white-space:pre-wrap;font-family:var(--mono);min-height:60px}
.oh{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ol{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.cpbtn{padding:3px 9px;font-size:10px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:transparent;color:var(--text3);font-family:var(--f);transition:all .15s}
.cpbtn:hover{background:var(--bg4);color:var(--text2)}

/* TOUCH CARDS */
.tc{border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.th{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;background:var(--bg3);transition:background .15s}
.th:hover{background:var(--bg4)}
.td-day{font-size:10px;color:var(--text3);min-width:44px;font-weight:600;font-family:var(--mono)}
.tn{font-size:12px;font-weight:500;flex:1;color:var(--text)}
.tdn{font-size:10px;color:var(--teal);font-weight:600}
.ct{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500}
.ce{background:rgba(117,55,214,.15);color:#b388f7}
.cl{background:rgba(45,212,170,.12);color:var(--teal)}
.cm{background:rgba(224,95,208,.12);color:var(--pink)}
.tb{display:none;padding:14px;border-top:1px solid var(--border);background:var(--bg2)}
.tb.open{display:block}
.tg{font-size:12px;color:var(--text2);line-height:1.65;margin-bottom:10px;padding:8px 12px;background:var(--bg3);border-radius:var(--rs);border-left:2px solid var(--accent)}

/* SIGNALS */
.sr{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.sr:last-child{border-bottom:none}
.sd{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.st{flex:1;font-size:12px;line-height:1.6}

/* SCORE */
.sbig{text-align:center;padding:20px;border-radius:var(--r);margin-bottom:14px}
.snum{font-size:48px;font-weight:600;line-height:1;font-family:var(--mono)}
.srow{display:flex;align-items:flex-start;gap:12px;padding:9px 0;border-bottom:1px solid var(--border)}
.srow:last-child{border-bottom:none}
.spill{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:600;min-width:52px;text-align:center;flex-shrink:0}
.sp{background:rgba(76,175,130,.15);color:var(--green);border:1px solid rgba(76,175,130,.2)}
.sw{background:rgba(245,166,35,.12);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
.sf{background:rgba(224,95,95,.12);color:var(--red);border:1px solid rgba(224,95,95,.2)}

/* REPLY CHIPS */
.chip{padding:6px 14px;font-size:11px;border-radius:20px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--text2);transition:all .15s;font-family:var(--f);font-weight:500}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* SUBJECT ROWS */
.svrow{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--rs);margin-bottom:6px;background:var(--bg3)}
.svtag{font-size:10px;padding:2px 8px;border-radius:4px;background:var(--bg4);color:var(--text2);border:1px solid var(--border);min-width:68px;text-align:center;flex-shrink:0}
.svtxt{flex:1;font-size:12px;font-family:var(--mono);color:var(--text)}

/* IDEA TAGS */
.itag{display:inline-block;font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid var(--border);cursor:pointer;color:var(--text2);margin:3px;transition:all .15s}
.itag:hover{border-color:var(--accent);color:var(--accent);background:rgba(117,55,214,.08)}

/* RULES */
.ri{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.ri:last-child{border-bottom:none}
.rdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.rtxt{font-size:12px;color:var(--text2);line-height:1.5}
.rtxt strong{color:var(--text);font-weight:500}

/* STAT GRID */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.sc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.sl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:6px}
.sv{font-size:24px;font-weight:600;font-family:var(--mono)}

/* REP TABLE */
.rep-table{width:100%;border-collapse:collapse}
.rep-table th{padding:8px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border)}
.rep-table td{padding:10px 12px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:top}
.rep-table tr:last-child td{border-bottom:none}
.rep-table tr:hover td{background:var(--bg3)}

/* ACCOUNT CARD */
.ac-card{border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;background:var(--bg2);display:flex;align-items:flex-start;gap:14px;transition:border-color .15s}
.ac-card:hover{border-color:var(--border2)}
.ac-avatar{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.ac-info{flex:1;min-width:0}
.ac-name{font-size:13px;font-weight:600}
.ac-meta{font-size:11px;color:var(--text2);margin-top:2px}
.ac-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}

/* ADD ACCOUNT MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:28px;width:520px;max-width:95vw;max-height:85vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:600;margin-bottom:20px}

/* HOOK BANNER */
.hb{background:rgba(45,212,170,.08);border:1px solid rgba(45,212,170,.2);border-radius:var(--rs);padding:10px 14px;font-size:12px;color:var(--teal);margin-bottom:12px;display:flex;align-items:flex-start;gap:10px}

/* LOADING */
.loading::after{content:'';animation:ld 1.2s steps(4,end) infinite}
@keyframes ld{0%,20%{content:''}40%{content:'.'}60%{content:'..'}80%,100%{content:'...'}}

/* PRIORITY ROW */
.pr{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.pr:last-child{border-bottom:none}
.pr-acct{font-size:12px;font-weight:600;min-width:140px}
.pr-sig{flex:1;display:flex;gap:6px;flex-wrap:wrap}

/* REP SECTION IN MANAGER VIEW */
.rep-section{margin-bottom:20px}
.rep-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;cursor:pointer}
.rep-header:hover{background:var(--bg4)}
.rep-header-name{font-size:13px;font-weight:600;flex:1}
.rep-body{border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden}
.rep-body.closed{display:none}

.wizard-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;font-family:var(--f)}
.wizard{background:#111318;border:1px solid rgba(255,255,255,.15);border-radius:18px;width:580px;max-width:95vw;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column}
.wizard::-webkit-scrollbar{width:4px}.wizard::-webkit-scrollbar-thumb{background:#1e222b;border-radius:4px}
.wiz-header{padding:28px 28px 0}
.wiz-step-dots{display:flex;gap:6px;margin-bottom:20px}
.wiz-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .2s}
.wiz-dot.active{background:#7537d6;width:20px;border-radius:3px}
.wiz-dot.done{background:rgba(117,55,214,.4)}
.wiz-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.2}
.wiz-sub{font-size:13px;color:rgba(255,255,255,.45);margin-bottom:24px;line-height:1.6}
.wiz-body{padding:0 28px;flex:1}
.wiz-footer{padding:20px 28px 24px;display:flex;align-items:center;gap:10px;border-top:1px solid rgba(255,255,255,.07);margin-top:20px}
.wiz-skip{font-size:12px;color:rgba(255,255,255,.3);cursor:pointer;text-decoration:underline;margin-left:auto}
.wiz-skip:hover{color:rgba(255,255,255,.5)}
.acct-setup-card{border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;background:#0e1016}
.acct-setup-card:hover{border-color:rgba(117,55,214,.4);background:rgba(117,55,214,.05)}
.acct-setup-card.selected{border-color:#7537d6;background:rgba(117,55,214,.1)}
.acct-check{width:18px;height:18px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.acct-check.checked{background:#7537d6;border-color:#7537d6}
.acct-check.checked::after{content:"✓";font-size:10px;color:#fff}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.status-opt{border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .15s}
.status-opt:hover{border-color:rgba(117,55,214,.4)}
.status-opt.sel{border-color:#7537d6;background:rgba(117,55,214,.1)}
.status-opt .s-label{font-size:12px;font-weight:600;color:#e8eaf0}
.status-opt .s-desc{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px}
.wiz-input{width:100%;padding:9px 12px;font-size:12px;background:#0e1016;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#e8eaf0;font-family:var(--f);transition:border-color .15s;margin-bottom:10px}
.wiz-input:focus{outline:none;border-color:#7537d6}
.wiz-input::placeholder{color:rgba(255,255,255,.2)}
.wiz-textarea{resize:vertical;min-height:70px}
.wiz-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:5px;display:block}
.added-acct{background:#0e1016;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:8px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.added-acct-name{font-size:12px;font-weight:600;color:#e8eaf0;flex:1}
.added-acct-status{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
.progress-bar{height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-bottom:6px;overflow:hidden}
.progress-fill{height:100%;background:#7537d6;border-radius:2px;transition:width .3s}


.quote-banner{background:linear-gradient(135deg,rgba(117,55,214,.15),rgba(117,55,214,.05));border:1px solid rgba(117,55,214,.25);border-radius:12px;padding:16px 20px;margin-bottom:14px;position:relative;overflow:hidden}
.quote-banner::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:rgba(117,55,214,.08)}
.quote-text{font-size:13px;font-weight:500;color:#e8eaf0;line-height:1.6;margin-bottom:6px;font-style:italic}
.quote-author{font-size:11px;color:rgba(117,55,214,.8);font-weight:600}
.quote-emoji{font-size:20px;margin-bottom:8px;display:block}

</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" style="width:36px;height:36px">
        <path fill="#7537d6" d="M18.51,9.18v9.14h-9.22C4.14,18.33,0,14.2,0,9.18c0-2.51,1.02-4.81,2.69-6.46,1.67-1.72,3.99-2.72,6.61-2.72s4.86,1,6.53,2.72c1.67,1.65,2.69,3.94,2.69,6.46"/>
        <path fill="#7537d6" d="M18.51,21.24v5.46c0,5.16-4.14,9.3-9.22,9.3-2.61,0-4.94-1.02-6.61-2.76-1.67-1.67-2.69-4-2.69-6.54v-10.19c2.11,2.91,5.52,4.73,9.29,4.73h9.22Z"/>
        <path fill="#7537d6" d="M21.45,18.33h5.61c5.18,0,9.33-4.1,9.33-9.13,0-2.59-1.02-4.89-2.77-6.54C31.95,1.01,29.61,0,27.06,0h-10.35c2.92,2.08,4.74,5.46,4.74,9.2v9.13Z"/>
      </svg>
      <div>
        <div style="font-size:28px;font-weight:700;color:#fff;letter-spacing:-.02em;line-height:1">Tempo</div>

let wizStep = 0, wizSelectedPresets = new Set(), wizAddedAccounts = [],

const WIZ_STEPS = [
  {

    sub: 'Your AI-powered prospecting agent. Let\'s get your book of business set up — it takes about 3 minutes.',
    next: 'Let\'s go →',

      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px">
        ${[['📡','Signal research','Monitors your accounts 24/7'],['✉️','RWOS outreach','Sequences that follow your methodology'],['🏴','Competitor intel','Tracks Mirakl, Tradebyte & more']].map(([i,t,d])=>`

  },
  {
    title: () => 'Add accounts from the EMEA list',
    sub: 'These are the key UK retail accounts. Select all that are in your book of business — you can edit or add more after.',
    next: 'Next →',
    back: true, skip: true,
    render: () => {
      const groups = {
        'Open opportunities': PRESET_ACCOUNTS.filter(a=>a.status==='open'||a.status==='nurture'),
        'EU expansion': PRESET_ACCOUNTS.filter(a=>a.status==='eu'),
        'Cold targets': PRESET_ACCOUNTS.filter(a=>a.status==='cold'),
        'Customers': PRESET_ACCOUNTS.filter(a=>a.status==='won')
      };
      let h = '';
      Object.entries(groups).forEach(([label,accts]) => {
        h += `<div style="font-size:10px;font-weight:600;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.09em;margin-bottom:6px;margin-top:12px">${label}</div>`;

          const sel = wizSelectedPresets.has(a.name);

            <div class="acct-check${sel?' checked':''}"></div>
            <div style="flex:1">
              <div style="font-size:12px;font-weight:600;color:#e8eaf0">${a.name}</div>

            </div>
            <span style="font-size:9px;padding:2px 8px;border-radius:10px;font-weight:500;background:${sc}">${STATUS_LABELS_WIZ[a.status]||'Target'}</span>
          </div>`;
        });
      });
      h += `<div style="font-size:11px;color:rgba(255,255,255,.3);padding:10px 0 4px">${wizSelectedPresets.size} account${wizSelectedPresets.size===1?'':'s'} selected</div>`;

  },
  {
    title: () => 'Add your own accounts',
    sub: 'Any accounts not on the list? Add them here. You can also do this later from the dashboard.',
    next: 'Next →',
    back: true, skip: true,
    render: () => {
      const statusOpts = [
        {val:'open',label:'Open opp',desc:'Active opportunity in progress'},
        {val:'nurture',label:'Open — multithread',desc:'Multiple stakeholders to engage'},
        {val:'eu',label:'US → EU expansion',desc:'Existing US customer, expand EU'},
        {val:'cold',label:'Cold target',desc:'Not yet approached'},
        {val:'won',label:'Closed won',desc:'Existing customer — expand'},
      ];
      let h = '';
      if (wizAddedAccounts.length > 0) {
        h += `<div style="margin-bottom:12px">`;
        wizAddedAccounts.forEach((a,i) => {
          const sc = STATUS_COLORS_WIZ[a.status]||STATUS_COLORS_WIZ.cold;
          h += `<div class="added-acct">
            <div class="added-acct-name">${a.name}</div>
            <span class="added-acct-status" style="background:${sc}">${STATUS_LABELS_WIZ[a.status]||'Target'}</span>
            <button onclick="removeCustomAcct(${i})" style="background:none;border:none;color:rgba(255,255,255,.25);cursor:pointer;font-size:14px;padding:0 2px">×</button>

        <div style="font-size:11px;font-weight:600;color:rgba(255,255,255,.5);margin-bottom:12px">Add an account</div>

        <span class="wiz-label">Status</span>
        <div class="status-grid">
          ${statusOpts.map(o=>`<div class="status-opt${wizCustomAcct.status===o.val?' sel':''}" onclick="setCustomStatus('${o.val}')">

            <div class="s-desc">${o.desc}</div>
          </div>`).join('')}

        <span class="wiz-label">Key persona / contact title</span>
        <input class="wiz-input" id="cust-persona" placeholder="e.g. Head of Ecommerce, CDO..." value="${wizCustomAcct.persona}" oninput="wizCustomAcct.persona=this.value"/>
        <span class="wiz-label">Context & background</span>
        <textarea class="wiz-input wiz-textarea" id="cust-ctx" placeholder="What do you know? Current situation, why they matter..." oninput="wizCustomAcct.context=this.value">${wizCustomAcct.context}</textarea>
        <span class="wiz-label">Key pain / hook</span>
        <textarea class="wiz-input wiz-textarea" id="cust-pain" placeholder="What challenge does Rithum solve for them?" oninput="wizCustomAcct.pain=this.value">${wizCustomAcct.pain}</textarea>
        <button class="btn-p btn" style="font-size:11px;padding:7px 16px;width:100%" onclick="addCustomAcct()">+ Add this account</button>
      </div>`;
      return h;
    }
  },
  {
    title: () => 'Review your book of business',
    sub: 'Here\'s everything you\'re setting up. You can edit any account from the dashboard after setup.',

    back: true, skip: false,
    render: () => {
      const all = [
        ...PRESET_ACCOUNTS.filter(a => wizSelectedPresets.has(a.name)),

function showWizard() {
  wizStep = 0; wizSelectedPresets = new Set(); wizAddedAccounts = [];
  wizCustomAcct = {name:'',status:'cold',persona:'',context:'',pain:''};
  document.getElementById('onboard-wizard').style.display = 'flex';
  renderWizStep();
}

function closeWizard() {
  document.getElementById('onboard-wizard').style.display = 'none';
}

function renderWizStep() {
  const step = WIZ_STEPS[wizStep];
  const total = WIZ_STEPS.length;
  document.getElementById('wiz-title').textContent = typeof step.title === 'function' ? step.title(USER?.name||'there') : step.title;
  document.getElementById('wiz-sub').textContent = typeof step.sub === 'function' ? step.sub() : step.sub;
  document.getElementById('wiz-body').innerHTML = step.render();
  document.getElementById('wiz-next').textContent = step.next;
  document.getElementById('wiz-back').style.display = step.back ? 'block' : 'none';
  document.getElementById('wiz-skip').style.display = step.skip ? 'block' : 'none';
  // Dots
  document.getElementById('wiz-dots').innerHTML = WIZ_STEPS.map((_,i) =>
    `<div class="wiz-dot${i===wizStep?' active':i<wizStep?' done':''}"></div>`
  ).join('');
  // Progress
  const pct = Math.round((wizStep / (total-1)) * 100);
}

function togglePreset(name) {
  if (wizSelectedPresets.has(name)) wizSelectedPresets.delete(name);
  else wizSelectedPresets.add(name);
  renderWizStep();
}

function setCustomStatus(val) {
  wizCustomAcct.status = val;
  const inp = document.getElementById('cust-name');
  if (inp) wizCustomAcct.name = inp.value;
  const inp2 = document.getElementById('cust-persona');
  if (inp2) wizCustomAcct.persona = inp2.value;
  const inp3 = document.getElementById('cust-ctx');
  if (inp3) wizCustomAcct.context = inp3.value;
  const inp4 = document.getElementById('cust-pain');
  if (inp4) wizCustomAcct.pain = inp4.value;
  renderWizStep();
}

function addCustomAcct() {
  const n = (document.getElementById('cust-name')||{}).value?.trim();
  if (!n) { const el=document.getElementById('cust-name'); if(el){el.style.borderColor='var(--red)';setTimeout(()=>el.style.borderColor='',1500);} return; }
  wizAddedAccounts.push({
    name: n,
    status: wizCustomAcct.status,
    persona: (document.getElementById('cust-persona')||{}).value?.trim()||'',
    context: (document.getElementById('cust-ctx')||{}).value?.trim()||'',
    pain: (document.getElementById('cust-pain')||{}).value?.trim()||'',
  });
  wizCustomAcct = {name:'',status:'cold',persona:'',context:'',pain:''};
  renderWizStep();
}

function removeCustomAcct(idx) {
  wizAddedAccounts.splice(idx,1);
  renderWizStep();
}

async function wizNext() {
  // On final step — save and close
  if (wizStep === WIZ_STEPS.length - 1) { closeWizard(); return; }
  // On review step — save all accounts first
  if (wizStep === WIZ_STEPS.length - 2) {
    const btn = document.getElementById('wiz-next');
    btn.textContent = 'Saving...'; btn.disabled = true;
    const toSave = [
      ...PRESET_ACCOUNTS.filter(a => wizSelectedPresets.has(a.name)),
      ...wizAddedAccounts
    ];
    for (const acct of toSave) {
      try { await addAccount(acct); } catch(e) { console.error('Failed to save', acct.name, e); }
    }
    btn.disabled = false;
  }
  wizStep++;
  renderWizStep();
  document.getElementById('wizard-box').scrollTop = 0;
}

function wizBack() {
  if (wizStep > 0) { wizStep--; renderWizStep(); document.getElementById('wizard-box').scrollTop = 0; }
}

// ─── ACCOUNT SETUP SCREEN (accessible after onboarding from dashboard) ────────
function showAccountSetup() {
  wizStep = 1; // jump straight to account selection
  wizSelectedPresets = new Set(ACCOUNTS.map(a=>a.name));
  document.getElementById('onboard-wizard').style.display = 'flex';
  renderWizStep();
}

function getDailyQuote() {
  const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
  return DAILY_QUOTES[dayOfYear % DAILY_QUOTES.length];
}

function renderQuoteBanner() {
  const q = getDailyQuote();
  return `<div class="quote-banner">
    <span class="quote-emoji">${q.emoji}</span>
    <div class="quote-text">"${q.text}"</div>
    <div class="quote-author">— ${q.author}</div>
  </div>`;
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  const u = document.getElementById('li-user').value.trim();
  const p = document.getElementById('li-pass').value.trim();
  if (!u || !p) return;
  try {
    const r = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u,password:p}) });
    if (!r.ok) { document.getElementById('login-err').style.display='block'; return; }
    const d = await r.json();
    TOKEN = d.token; USER = d;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    document.getElementById('sb-uname').textContent = d.name;
    document.getElementById('sb-role').textContent = d.role === 'manager' ? 'Manager' : 'Rep';
    document.getElementById('sb-role').className = 'sb-role ' + (d.role === 'manager' ? 'role-mgr' : 'role-rep');
    await loadAccounts();
    initView();
    if (USER.role !== 'manager' && ACCOUNTS.length === 0) {
      setTimeout(() => showWizard(), 400);
    }
  } catch(e) { document.getElementById('login-err').style.display='block'; }
}

function doLogout() {
  TOKEN=''; USER=null; ACCOUNTS=[]; curView='dashboard'; curAcct=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app-screen').style.display='none';
  document.getElementById('li-pass').value='';
  document.getElementById('login-err').style.display='none';
}

document.getElementById('li-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('li-user').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('li-pass').focus(); });

// ─── ACCOUNTS ─────────────────────────────────────────────────────────────────
async function loadAccounts() {
  const r = await fetch('/api/accounts', { headers:{'x-token':TOKEN} });
  const d = await r.json();
  if (USER.role === 'manager') { ALL_ACCOUNTS = d.all; TEAM_INFO = d.teamInfo; }
  else { ACCOUNTS = d.accounts || []; }
  renderSidebar();
}

async function addAccount(data) {
  const r = await fetch('/api/accounts', { method:'POST', headers:{'Content-Type':'application/json','x-token':TOKEN}, body:JSON.stringify(data) });
  const acct = await r.json();
  ACCOUNTS.push(acct);
  renderSidebar();
  return acct;
}

async function deleteAccount(id) {
  await fetch('/api/accounts/'+id, { method:'DELETE', headers:{'x-token':TOKEN} });
  ACCOUNTS = ACCOUNTS.filter(a => a.id !== id);
  if (curAcct && curAcct.id === id) { curAcct = null; curView = 'dashboard'; }
  renderSidebar();
  initView();
}

async function updateAccount(id, data) {
  const r = await fetch('/api/accounts/'+id, { method:'PUT', headers:{'Content-Type':'application/json','x-token':TOKEN}, body:JSON.stringify(data) });
  const updated = await r.json();
  const idx = ACCOUNTS.findIndex(a => a.id === id);
  if (idx !== -1) ACCOUNTS[idx] = updated;
  return updated;
}

function goView(v) {

    document.getElementById('tabrow').innerHTML = '';
    document.getElementById('content').innerHTML = renderMgrSignals();
    return;

  document.getElementById('tname').textContent = title;
  buildTabs(tabs, defaultTab);
}

function buildTabs(tabs, active) {
  document.getElementById('tabrow').innerHTML = tabs.map(t =>
    `<div class="tab${t===active?' active':''}" onclick="setTab('${t}')" id="t-${t}">${TAB_LABELS[t]||t}${NEW_TABS.includes(t)?'<span class="nd"></span>':''}</div>`
  ).join('');
  curTab = active;
  renderPane();
}

function setTab(t) {
  curTab = t;
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
  const el = document.getElementById('t-'+t); if(el) el.classList.add('active');
  renderPane();
}

async function gT(idx,e) {
  e.stopPropagation();
  if (!curAcct) return;
  const a=curAcct, type=seqType(a.status), t=SQ[type][idx];
  openT[idx]=true;
  const oel=document.getElementById('to-'+idx);
  if(oel)oel.innerHTML='<div class="out" style="margin-top:10px"><span class="loading">Writing</span></div>';
  const prev=Object.entries(genSeq).filter(([k])=>parseInt(k)<idx).map(([k,v])=>`Touch ${parseInt(k)+1}:\n${v}`).join('\n\n');
  const hook=pendingHook?`\nUse this live signal as hook: ${pendingHook}`:'';
  const p=`Write touch ${idx+1} for ${a.name}, ${t.name} ${t.ch}.\nContext: ${a.context||''}\nPain: ${a.pain||''}\nPersona: ${a.persona||''}\nSignals: ${(a.signals||[]).join('; ')}${hook}\nGuidance: ${t.g}\n${prev?`Previous touches:\n${prev}`:''}\nWrite only the copy. For email: Subject: then blank line then body.`;
  const r=await ai(p,SYS);
  genSeq[idx]=r;
  renderPane();openT[idx]=true;
  const tb=document.getElementById('tb-'+idx);if(tb)tb.className='tb open';
  const to=document.getElementById('to-'+idx);
  if(to)to.innerHTML=`<div class="oh" style="margin-top:10px"><span class="ol">Copy</span><button class="cpbtn" onclick="cp('tt-${idx}')">copy</button></div><div class="out" id="tt-${idx}">${r}</div>`;
}

function rChecker() {

async function runChk() {
  const em=document.getElementById('ckin').value.trim();if(!em)return;
  const el=document.getElementById('chk-r');
  el.innerHTML='<div class="out"><span class="loading">Checking</span></div>';
  const p=`Score this email against RWOS rules. Return JSON only:\n{"overall":0-100,"verdict":"Pass|Needs work|Fail","checks":[{"rule":"Subject line 1-4 words","status":"pass|warn|fail","note":""},{"rule":"Subject line lower case","status":"pass|warn|fail","note":""},{"rule":"First 5-6 words hook on their world","status":"pass|warn|fail","note":""},{"rule":"Personalised to their situation","status":"pass|warn|fail","note":""},{"rule":"Social proof included","status":"pass|warn|fail","note":""},{"rule":"100 words or less","status":"pass|warn|fail","note":"word count: X"},{"rule":"CTA asks for interest not time","status":"pass|warn|fail","note":""},{"rule":"Does not start with I","status":"pass|warn|fail","note":""}],"topFix":"","rewrite":""}\nEmail:\n${em}`;
  const raw=await ai(p,'You are an RWOS email compliance checker. Return only valid JSON.');
  try {
    const r=JSON.parse(raw.replace(/```json|```/g,'').trim());
    const sc=r.verdict==='Pass'?'var(--green)':r.verdict==='Needs work'?'var(--amber)':'var(--red)';
    const sb=r.verdict==='Pass'?'rgba(76,175,130,.1)':r.verdict==='Needs work'?'rgba(245,166,35,.1)':'rgba(224,95,95,.1)';
    let h=`<div class="sbig" style="background:${sb};border:1px solid ${sc}20"><div class="snum" style="color:${sc}">${r.overall}</div><div style="font-size:13px;margin-top:6px;font-weight:500;color:${sc}">${r.verdict}</div></div>
    <div class="card">${(r.checks||[]).map(c=>`<div class="srow"><div style="flex:1"><div style="font-size:12px">${c.rule}</div><div style="font-size:11px;color:var(--text2);margin-top:2px">${c.note||''}</div></div><span class="spill ${c.status==='pass'?'sp':c.status==='warn'?'sw':'sf'}">${c.status==='pass'?'Pass':c.status==='warn'?'Review':'Fail'}</span></div>`).join('')}</div>`;
    if(r.topFix)h+=`<div class="card" style="border-color:rgba(245,166,35,.3)"><div class="card-h" style="color:var(--amber)">Top fix</div><div style="font-size:12px;color:var(--text2);line-height:1.6">${r.topFix}</div></div>`;
    if(r.rewrite)h+=`<div class="card"><div class="oh"><span class="ol">Suggested rewrite</span><button class="cpbtn" onclick="cp('ck-rw')">copy</button></div><div class="out" id="ck-rw">${r.rewrite}</div></div>`;
    el.innerHTML=h;
  } catch { el.innerHTML=`<div class="out">${raw}</div>`; }
}

  const p=`Draft a RWOS-compliant ${v?'3 variants of a ':''}follow-on response:\nAccount: ${ac}\nContact: ${co}\nReply type: ${replyType}\nTheir reply: ${ry||'no reply'}\nContext: ${ct}\nGuide: ${gs[replyType]}\n${v?'Number variants 1-3 with labels.':''}\nShort, specific, RWOS-compliant.`;

async function gSub() {
  const ac=document.getElementById('sbac').value.trim();
  const an=document.getElementById('sban').value.trim();
  const hk=document.getElementById('sbhk').value.trim();
  const el=document.getElementById('sb-r');

  const p=`Generate exactly 5 subject line variants for cold outreach to ${ac||'a UK retailer'}.\nAngle: ${an||'Rithum retail platform'}\nHook: ${hk||'none'}\nRules: Every subject 1-4 words, lower case. Each a different approach. Label each [curiosity], [pain], [peer proof], [signal], or [direct].\nReturn only 5 lines with labels. Nothing else.`;
  const r=await ai(p,SYS);
  const ls=r.split('\n').filter(l=>l.trim());
  let h='';
  ls.forEach((l,i)=>{
    const lm=l.match(/\[(.+?)\]/);const lab=lm?lm[1]:'option '+(i+1);
    const s=l.replace(/\[.+?\]/,'').replace(/^\d+[.\)]\s*/,'').trim();
    if(!s)return;
    h+=`<div class="svrow"><span class="svtag">${lab}</span><span class="svtxt">${s}</span><button class="btn btn-sm" onclick="navigator.clipboard.writeText('${s.replace(/'/g,"\\'")}')">copy</button></div>`;
  });
  el.innerHTML=h||`<div class="out">${r}</div>`;
}

// RULES
function rRules() {
  const er=[['Subject: 1-4 words, lower case','lower case outperforms by 11%'],['First 5-6 words hook on THEIR situation','not Rithum, their world first'],['Personalised to their world','5x reply rates'],['Social proof: 1-2 sentences','peer UK retailer — Pets at Home is a reference'],['100 words or less','hard limit'],['CTA: interest not time','"Open to learning more?" never "Can we book 30 mins?"'],['Never start with I','start with them']];
  const cr=[['~6 touches over 14-28 days','for maximum effectiveness'],['Mix email + LinkedIn + phone','never single channel'],['Bump: 1-2 sentences','2-3 days after personalised email'],['Same-day multi-touch','call + VM + email = 3x response rates'],['Break-up email','89% reply rate lift'],['Is there someone else? email','keeps you in play']];
  const lr=[['Connection: 300 chars max','human, no pitch'],['Follow-up: 500 chars max','insight before ask'],['Send same day as email','multi-touch maximises visibility']];
  const s=(t,rs,c)=>`<div class="card"><div class="card-h">${t}</div>${rs.map(([r,n])=>`<div class="ri"><div class="rdot" style="background:${c}"></div><div class="rtxt"><strong>${r}</strong> — ${n}</div></div>`).join('')}</div>`;
  return s('Email rules',er,'var(--accent)')+s('Cadence rules',cr,'var(--teal)')+s('LinkedIn rules',lr,'var(--amber)');
}

// ─── AI ───────────────────────────────────────────────────────────────────────
async function ai(prompt, sys, ws=false) {
  try {
    const body = { model:'claude-sonnet-4-20250514', max_tokens:900, system:sys, messages:[{role:'user',content:prompt}] };
    if (ws) body.tools = [{type:'web_search_20250305',name:'web_search'}];
    const r = await fetch('/api/ai', { method:'POST', headers:{'Content-Type':'application/json','x-token':TOKEN}, body:JSON.stringify(body) });
    const d = await r.json();
    if (d.error) return 'Error: '+(typeof d.error === 'object' ? JSON.stringify(d.error) : d.error);
    if (d.content && Array.isArray(d.content)) {
      return d.content.filter(b => b.type === 'text').map(b => b.text).join('').trim() || 'No response.';
    }
    return 'No response.';
  } catch(e) { return 'Error: '+e.message; }
}
